<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>UvaImpostor Clean Edition</title>
    <style>
        :root { 
            --bg-body: #2563eb; 
            --btn-neon: #fb923c; 
            --btn-action: #fef08a; 
            --border-bold: #000000;
        }
        
        body { 
            font-family: 'Arial Black', sans-serif;
            background-color: var(--bg-body); 
            margin: 0; padding: 10px; 
            display: flex; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container { 
            width: 100%; max-width: 320px; 
            background: #ffffff; 
            padding: 15px; 
            border-radius: 20px; 
            border: 4px solid var(--border-bold);
            box-shadow: 8px 8px 0px var(--border-bold);
            text-align: center;
        }

        h1 { 
            font-size: 24px; margin: 0; 
            background-color: var(--btn-neon); 
            color: #000; padding: 10px;
            border: 3px solid var(--border-bold);
            border-radius: 12px;
            display: block;
            text-transform: uppercase;
        }
        
        .author { font-size: 9px; font-weight: 900; margin: 10px 0; display: block; opacity: 0.7; }

        input { 
            width: 100%; padding: 10px; 
            box-sizing: border-box; border-radius: 10px; 
            border: 3px solid var(--border-bold); 
            font-size: 14px; text-align: center; font-weight: 900;
            margin-bottom: 8px; box-shadow: 3px 3px 0px var(--border-bold);
        }

        .btn { 
            border: 3px solid var(--border-bold); border-radius: 12px; 
            padding: 10px; width: 100%; 
            font-weight: 900; font-size: 14px; 
            text-transform: uppercase; margin: 5px 0;
            cursor: pointer; box-shadow: 3px 3px 0px var(--border-bold);
            transition: 0.1s;
        }
        
        .btn-add { background: var(--btn-neon); color: #000; }
        .btn-action { background: var(--btn-action); color: #000; } 
        .btn-option { background: #e2e8f0; padding: 8px; }
        .btn-option.active { background: var(--btn-neon); }
        .btn:active { transform: translate(2px, 2px); box-shadow: none; }

        #plist { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 10px 0; }
        .player-tag { 
            background: #fff; padding: 5px 8px; 
            border-radius: 8px; border: 2px solid var(--border-bold);
            font-weight: 900; font-size: 11px;
        }

        .config-box { 
            margin: 15px 0; border: 3px solid var(--border-bold); 
            padding: 10px; border-radius: 15px; background: #fff; 
        }

        #word-box { 
            font-size: 28px; margin: 15px 0; padding: 40px 10px; 
            border-radius: 15px; background: var(--border-bold);
            border: 4px solid var(--btn-action); color: var(--btn-action);
            font-weight: 900; text-transform: uppercase; 
            display: flex; align-items: center; justify-content: center;
            min-height: 100px; line-height: 1.1;
        }

        #turn-text { color: #000000; font-weight: normal; font-size: 14px; text-transform: lowercase; }
        #player-highlight { color: #000000; font-weight: 900; font-size: 22px; display: block; margin-top: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>UvaImpostor</h1>
    <span class="author"><h2>Diseño: Uvaldo Vargas G.</h2></span>

    <div id="s1">
        <input type="text" id="pname" placeholder="ESCRIBA NOMBRE..." autocomplete="off">
        <button class="btn btn-add" onclick="addP()">+ AÑADIR JUGADOR</button>
        <div id="plist"></div>
        <div class="config-box">
            <span style="font-weight:900; font-size:11px; display:block; margin-bottom:8px;">Cuántos Impostores</span>
            <div style="display:flex; gap:8px">
                <button id="opt1" class="btn btn-option active" style="margin:0" onclick="setImp(1)">1</button>
                <button id="opt2" class="btn btn-option" style="margin:0" onclick="setImp(2)">2</button>
            </div>
        </div>
        <button id="start-btn" class="btn btn-action hidden" onclick="startG()">¡JUGAR AHORA!</button>
    </div>

    <div id="s2" class="hidden">
        <div style="margin-bottom: 15px;">
            <span id="turn-text">turno de:</span>
            <span id="player-highlight"></span>
        </div>
        <div id="cover" style="border: 4px solid var(--border-bold); padding: 15px; border-radius: 20px; background: #fff;">
            <p style="font-weight: 900; font-size: 12px; margin-bottom:10px; color: #000;">¡PASA EL DISPOSITIVO!</p>
            <button class="btn btn-add" style="height: 80px; font-size: 13px;" onclick="rev()">TOQUE AQUÍ PARA VER LA PALABRA</button>
        </div>
        <div id="secret" class="hidden">
            <div id="word-box"></div>
            <button class="btn btn-action" onclick="nextT()">ENTENDIDO</button>
        </div>
    </div>

    <div id="s3" class="hidden">
        <h2 style="color: var(--btn-neon); font-size: 26px; margin: 0; -webkit-text-stroke: 1.5px var(--border-bold);">¡DEBATE!</h2>
        <div id="starter" style="background: #fff; padding: 20px; border-radius: 15px; margin: 15px 0; border: 4px solid var(--border-bold); font-weight: 900; font-size: 18px;"></div>
        <button class="btn btn-action" onclick="startG()">SIGUIENTE RONDA</button>
        <button class="btn btn-option" style="color:#000; border-color:var(--border-bold); width:100%" onclick="showS('s1')">EDITAR GRUPO</button>
    </div>
</div>

    var players = JSON.parse(localStorage.getItem('uva_players')) || [];
    var shuffledPlayers = [], cur = 0, numImp = 1, impostores = [], word = "";

    window.onload = function() { renderList(); checkBtn(); };

    function decir(t) {
        if ('speechSynthesis' in window) {
            var m = new SpeechSynthesisUtterance(t);
            m.lang = 'es-ES';
            window.speechSynthesis.speak(m);
        }
    }

    function addP() {
        var input = document.getElementById('pname');
        if(input.value.trim()) {
            players.push(input.value.trim());
            localStorage.setItem('uva_players', JSON.stringify(players));
            renderList(); checkBtn();
            input.value = ""; input.focus();
        }
    }

    function removeP(index) {
        players.splice(index, 1);
        localStorage.setItem('uva_players', JSON.stringify(players));
        renderList(); checkBtn();
    }

    function renderList() {
        var list = document.getElementById('plist');
        list.innerHTML = "";
        players.forEach(function(p, i) {
            list.innerHTML += "<div class='player-tag'>"+p+" <span style='color:red; cursor:pointer' onclick='removeP("+i+")'>×</span></div>";
        });
    }

    function checkBtn() {
        document.getElementById('start-btn').classList.toggle('hidden', players.length < 3);
    }

    function setImp(n) {
        numImp = n;
        document.getElementById('opt1').className = n==1 ? "btn btn-option active" : "btn btn-option";
        document.getElementById('opt2').className = n==2 ? "btn btn-option active" : "btn btn-option";
    }

    function startG() {
        if(numImp === 2 && players.length < 5) return alert("Mínimo 5 jugadores.");
        word = words[Math.floor(Math.random() * words.length)];
        cur = 0;
        
        shuffledPlayers = [...players].sort(() => 0.5 - Math.random());
        
        var tempPool = [...players];
        impostores = [];
        for(var i=0; i<numImp; i++) {
            var r = Math.floor(Math.random() * tempPool.length);
            impostores.push(tempPool.splice(r, 1)[0]); // Extraer string puro
        }
        
        showS('s2');
        prep();
    }

    function prep() {
        var n = shuffledPlayers[cur];
        document.getElementById('player-highlight').innerHTML = n;
        decir("Turno de " + n);
        document.getElementById('cover').classList.remove('hidden');
        document.getElementById('secret').classList.add('hidden');
    }

    function rev() {
        var nombreActual = shuffledPlayers[cur];
        var isImp = (impostores.indexOf(nombreActual) !== -1);
        
        var box = document.getElementById('word-box');
        box.innerHTML = isImp ? "¡TÚ ERES EL IMPOSTOR!" : word;
        document.getElementById('cover').classList.add('hidden');
        document.getElementById('secret').classList.remove('hidden');
    }

    function nextT() {
        cur++;
        if(cur < shuffledPlayers.length) {
            prep();
        } else {
            showS('s3');
            var pStart = players[Math.floor(Math.random()*players.length)];
            document.getElementById('starter').innerHTML = "<span style='font-size:11px; opacity:0.7; color:#000;'>EMPIEZA DEBATE:</span><br><span style='color:#000; font-weight:900;'>" + pStart + "</span>";
            decir("Empieza " + pStart);
        }
    }

    function showS(id) {
        document.getElementById('s1').classList.add('hidden');
        document.getElementById('s2').classList.add('hidden');
        document.getElementById('s3').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }
